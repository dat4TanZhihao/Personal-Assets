services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgres://pat:${POSTGRES_PASSWORD:-change-me}@db:5432/personal_assets
    ports:
      - "3000:3000"
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_assets
      POSTGRES_USER: pat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pat -d personal_assets"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
